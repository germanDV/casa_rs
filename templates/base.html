<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #242424;
      --bg-card-hover: #2d2d2d;
      --border-color: #333;
      --text-primary: #e4e4e4;
      --text-secondary: #a0a0a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    h1, h2, h4 { color: var(--text-primary); }
    h1 { font-size: 2rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.25rem; margin: 2rem 0 1rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-hover); }

    form { margin-bottom: 2rem; }
    input[type="text"], textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    textarea { min-height: 100px; resize: vertical; }

    button[type="submit"] {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.98); }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      list-style: none;
      padding: 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    .card a { display: block; }
    .card h4 { margin-bottom: 0.5rem; }
    .card summary { font-size: 1.3rem; }
    .card p { font-size: 1rem; }
    .card small { text-align: right; }

    details { margin-top: 0.5rem; }
    details summary { cursor: pointer; font-weight: 600; padding: 0.25rem 0; }
    details p { margin-top: 0.5rem; }
    details small { display: block; margin-top: 1rem; color: var(--text-secondary); font-size: 0.8rem; }

    em { color: var(--text-secondary); }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
