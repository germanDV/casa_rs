<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-column: #242424;
      --bg-card: #2d2d2d;
      --border-color: #333;
      --text-primary: #e4e4e4;
      --text-secondary: #a0a0a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    h1, h2, h4 { color: var(--text-primary); }
    h1 { font-size: 2rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.25rem; margin: 2rem 0 1rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent-hover); }

    p { overflow-wrap: break-word; }

    form { margin-bottom: 2rem; }
    input, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1); /* Flips black to white for dark themes */
    }
    textarea { min-height: 100px; resize: vertical; }

    button[type="submit"] {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:active { transform: scale(0.98); }

    .dashboard-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    .dashboard-column {
      min-width: 0;
      padding: 1.5rem;
      background: var(--bg-column);
      border: 1px solid var(--border-color);
      border-radius: 12px;
    }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      list-style: none;
      padding: 0;
    }
    .card-list .card {
      width: 100%;
      box-sizing: border-box;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      list-style: none;
      padding: 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    .card a { display: block; }
    .card h4 { margin-bottom: 0.5rem; }
    .card summary { font-size: 1.3rem; }
    .card p { font-size: 1rem; }
    .card small { text-align: right; }

    details { margin-top: 0.5rem; }
    details summary { cursor: pointer; font-weight: 600; padding: 0.25rem 0; }
    details p { margin-top: 0.5rem; }
    details small { display: block; margin-top: 1rem; color: var(--text-secondary); font-size: 0.8rem; }

    em { color: var(--text-secondary); }

    input[type="checkbox"] {
      width: 1.25rem;
      height: 1.25rem;
      accent-color: var(--accent);
      cursor: pointer;
      margin-bottom: 0;
    }

    .contacts {
      min-width: 0;
      padding: 1.5rem;
      background: var(--bg-column);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-top:2rem;
    }
    .contact {
        display:flex;
        justify-content: space-between;
    }

    .add-item {
        text-align: right;
        color: var(--text-secondary);
        font-size: 0.8rem;
    }

    .done {
        text-decoration: line-through;
    }

    .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1em;
    }
  </style>
</head>

<body>
    {% block content %}{% endblock %}

    <script>
      async function deleteEntity(cosaId, entity, entityId) {
        if (!confirm(`Eliminar ${entity}?`)) return;
        const res = await fetch(`/cosas/${cosaId}/${entity}s/${entityId}`, { method: 'DELETE' });
        if (res.ok) {
            document.getElementById(`${entity}-${entityId}`).remove();
        } else {
            alert(`Error al eliminar ${entity}`);
        }
      }

      async function deleteCosa(cosaId) {
        if (!confirm('Eliminar cosa?')) return;
        const res = await fetch(`/cosas/${cosaId}`, { method: 'DELETE' });
        if (res.ok) {
            window.location.href = '/';
        } else {
            alert('Error al eliminar cosa');
        }
      }
    </script>
</body>
</html>
