<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Casa</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; height: 80px; margin-bottom: 0.5rem; }
    button { padding: 0.4rem 1rem; }
    ul { list-style: none; padding: 0; }
    li { border-bottom: 1px solid #eee; padding: 0.6rem 0; }
  </style>
</head>
<body>
    <h1>📝 {{ cosa.name }}</h1>
    <h4> {{ cosa.description }}</h4>

    <form action="/cosas/{{ cosa.id }}/notes" method="post">
        <input type="text" name="title" placeholder="Título" required />
        <br />
        <textarea name="body" placeholder="Nota" required></textarea>
        <br />
        <button type="submit">Guardar</button>
    </form>

    <h2>Notas</h2>
    {% if notes.is_empty() %}
    <p><em>No hay notas todavía.</em></p>
    {% else %}
    <ul>
      {% for note in notes %}
        <li>
            <strong>#{{ note.id }}</strong> — {{ note.title }}
            <p>{{ note.body }}</p>
            <small>{{ note.created_at }}</small>
        </li>
      {% endfor %}
    </ul>
    {% endif %}
</body>
</html>
